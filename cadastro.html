<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div class="centralizar-tela">
        <div class="caixa" style="width: 320px;">
            <h2 style="text-align: center;">Cadastro</h2>
            <form>
                <div class="grupo-input">
                    <label for="nome">Nome</label>
                    <input type="nome" id="nome" placeholder="Digite seu nome" required><br>
                </div>

                <div class="grupo-input">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Digite um email" required><br>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="senha" id="senha" placeholder="Digite uma senha" required>
                </div>

                <div class="grupo-input">
                    <label for="confirmar-senha">Confirmar senha</label>
                    <input type="confirmar-senha" id="confirmar-senha" placeholder="Confirme sua senha" required>
                </div>

                <button type="submit" class="botao-primario" style="width: 100%;">
                    Cadastrar
                </button>
                <button type="submit" class="botao-secundario">
                    Logar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
